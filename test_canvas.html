<!doctype html>
<html>
<head><meta charset="utf-8"><title>Canvas skip test</title></head>
<body>
  <h1>Canvas incremental test</h1>
  <p>The square animates via setInterval; the canvas hash must detect each change.</p>
  <canvas id="c" width="320" height="160" style="border:1px solid #333"></canvas>
  <div>Static text below the canvas.</div>
  <script>
    var ctx = document.getElementById('c').getContext('2d');
    var x = 0;
    // Animate the canvas every 120ms. Ticks where the canvas changed must
    // RENDER (canvas_hash differs); ticks between changes must SKIP.
    setInterval(function () {
      ctx.clearRect(0, 0, 320, 160);
      ctx.fillStyle = '#3399ff';
      ctx.fillRect(x, 60, 48, 48);
      x = (x + 8) % 272;
    }, 120);
  </script>
</body>
</html>
