<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form Test</title>
<style>
  body { font: 16px/1.5 system-ui, sans-serif; background: #f5f5f5; color: #222; max-width: 640px; margin: 40px auto; padding: 24px; }
  h1 { font-size: 24px; margin: 0 0 24px; }
  form { background: white; padding: 24px; border: 1px solid #ddd; border-radius: 8px; }
  label { display: block; font-weight: 600; margin: 12px 0 4px; }
  input[type=text], input[type=email], input[type=password], textarea {
    display: block; width: 100%; box-sizing: border-box;
    padding: 8px 10px; font: 16px sans-serif; color: #111;
    background: white; border: 1px solid #888; border-radius: 4px;
  }
  textarea { min-height: 60px; }
  button {
    margin-top: 16px; padding: 10px 18px; font: 16px sans-serif;
    background: #2563eb; color: white; border: none; border-radius: 4px;
    cursor: pointer;
  }
  .status { margin: 16px 0; padding: 12px; background: #fffbe6; border: 1px solid #fde68a; border-radius: 4px; }
</style>
</head>
<body>
<h1>Form Test — Conclave</h1>

<p class="status">
  Test 1: click on the "Name" field and type something.<br>
  Test 2: type in the textarea.<br>
  Test 3: click the "Submit" button (or press Enter in a field).<br>
  Successful submit navigates to <code>/echo?name=&hellip;&amp;email=&hellip;&amp;message=&hellip;</code>.
</p>

<form action="https://httpbin.org/get" method="get">
  <label for="name">Name</label>
  <input type="text" id="name" name="name" placeholder="Your name" value="">

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="you@example.com" value="">

  <label for="password">Password</label>
  <input type="password" id="password" name="password" placeholder="should be masked" value="">

  <label for="message">Message</label>
  <textarea id="message" name="message" placeholder="Type a message"></textarea>

  <button type="submit">Submit</button>
</form>

</body>
</html>
